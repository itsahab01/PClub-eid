<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تهنئة العيد</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@100;200;300;400;500;600;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header class="header">
        <div class="header-content">
            <div class="club">
                <img src="assets/logo.png" alt="Programming Club Logo">
                <span>نادي البرمجة</span>
            </div>
        </div>
    </header>

    <div class="container">
        <h1>تهنئة العيد</h1>
        <p class="subtitle">اكتب اسمك واختر قالب التهنئة ليظهر مباشرة على البطاقة</p>

        <input type="text" id="nameInput" placeholder="الاســــم" maxlength="30">

        <div class="template-picker">
            <p class="picker-title">اختر التصميم</p>

            <div class="template-options">
                <label class="template-option active" data-template="template1">
                    <input type="radio" name="templateChoice" value="template1" checked>
                    <span>التصميم الأول</span>
                </label>

                <label class="template-option" data-template="template2">
                    <input  type="radio" name="templateChoice" value="template2">
                    <span>التصميم الثاني</span>
                </label>
            </div>
        </div>

        <div class="preview">
            <canvas id="card" width="800" height="1000"></canvas>
        </div>

        <div class="buttons">
            <button class="download" onclick="downloadCard()">تحميل الصورة</button>
        </div>
    </div>

    <footer class="footer">
        <p>صُنعت بواسطة <strong>نادي البرمجة</strong></p>

        <div class="footer-social">
            <a href="https://x.com/pclub_nu?s=21" target="_blank">
                <i class="fa-brands fa-x-twitter"></i>
            </a>

            <a href="https://www.linkedin.com/company/pclub-nu/" target="_blank">
                <i class="fa-brands fa-linkedin"></i>
            </a>
        </div>
    </footer>

    <script src="script.js"></script>
</body>

</html>
