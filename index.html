<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>تهنئة العيد</title>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;600&display=swap" rel="stylesheet">

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:'Tajawal', sans-serif;
}

body{
background:#f7f6f3;
display:flex;
align-items:center;
justify-content:center;
min-height:100vh;
padding:20px;
}

.container{
background:white;
padding:30px;
border-radius:16px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
max-width:900px;
width:100%;
text-align:center;
}

h1{
margin-bottom:10px;
color:#444;
}

.subtitle{
color:#777;
margin-bottom:25px;
}

input{
width:100%;
max-width:320px;
padding:12px;
border-radius:8px;
border:1px solid #ddd;
font-size:16px;
text-align:center;
}

.buttons{
margin-top:15px;
}

button{
padding:10px 20px;
border:none;
border-radius:8px;
cursor:pointer;
font-size:15px;
margin:5px;
}

.generate{
background:#b59b6a;
color:white;
}

.download{
background:#444;
color:white;
}

.preview{
margin-top:30px;
display:flex;
justify-content:center;
}

canvas{
width:100%;
max-width:400px;
aspect-ratio:4/5;
border-radius:12px;
box-shadow:0 6px 20px rgba(0,0,0,0.08);
}

</style>
</head>

<body>

<div class="container">

<h1>تهنئة العيد</h1>
<p class="subtitle">اكتب اسمك ليظهر على بطاقة التهنئة</p>

<input type="text" id="nameInput" placeholder="الاســــم">

<div class="buttons">
<button class="generate" onclick="generateCard()">عرض التهنئة</button>
<button class="download" onclick="downloadCard()">تحميل الصورة</button>
</div>

<div class="preview">
<canvas id="card" width="800" height="1000"></canvas>
</div>

</div>

<script>

const canvas = document.getElementById("card");
const ctx = canvas.getContext("2d");

const template = new Image();
template.src = "assets/eid-template.png";

template.onload = () => {
ctx.drawImage(template,0,0,800,1000);
}

function generateCard(){

const name = document.getElementById("nameInput").value;

ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.drawImage(template,0,0,800,1000);

ctx.font = "36px Tajawal";
ctx.fillStyle = "#7a6a4a";

ctx.textAlign = "right";
ctx.textBaseline = "middle";

let fontSize = 36;
ctx.font = fontSize + "px Tajawal";

while (ctx.measureText(name).width > 420){
fontSize--;
ctx.font = fontSize + "px Tajawal";
}

ctx.fillText(name,700,810);

}

function downloadCard(){

const link = document.createElement("a");
link.download = "eid-greeting.png";
link.href = canvas.toDataURL();
link.click();

}

</script>

</body>
</html>
